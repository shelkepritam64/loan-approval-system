<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Banking Risk System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo logo--lock">&#128274;</div>
      <h1>Admin Login</h1>
      <p>Access the risk management dashboard</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="login-error">
        <span>&#9888;&#65039;</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}
      <form method="POST" action="/login" id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter admin password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword()" id="togglePassBtn">&#128065;</button>
          </div>
        </div>
        <button type="submit" class="btn-predict" id="loginBtn" style="margin-top:12px">
          <span class="btn-text">&#128273; Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>
      <div class="login-footer">
        <a href="/" class="back-link">&larr; Back to Loan Application</a>
      </div>
    </div>
    <div class="footer">Banking Loan Risk Assessment System</div>
  </div>
  <script>
    function togglePassword(){
      const p=document.getElementById('password'),b=document.getElementById('togglePassBtn');
      if(p.type==='password'){p.type='text';b.innerHTML='&#128584;';}
      else{p.type='password';b.innerHTML='&#128065;';}
    }
    document.getElementById('loginForm').addEventListener('submit',function(){
      const b=document.getElementById('loginBtn');b.classList.add('loading');b.disabled=true;
    });
  </script>
</body>
</html>
